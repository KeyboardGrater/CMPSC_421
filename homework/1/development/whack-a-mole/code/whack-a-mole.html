            <!--Difficulty Button-->
            <p>
                <button id = "easy_button" class = "easy_button_class" onclick="game_settings.change_difficulty(Difficulty_modes.EASY)">Easy</button>
                <button id = "intermediate_button" class="intermediate_button_class" onclick="game_settings.change_difficulty(Difficulty_modes.INTERMEDIATE)">Intermediate</button>
                <button id = "hard_button" class = "hard_button_class" onclick="game_settings.change_difficulty(Difficulty_modes.HARD)">Hard</button>
            </p>
            
            <!--Start Button-->
            <p>
                <button id = "start_button" class = "start_button_class" onclick="start_game(game_settings)">Start</button>
            </p>
        
        <!--Timer-->
        <p>
            <h1 id = "round_timer_display">Timer</h1>
        </p>

    </body>

    <script>
        // Constants
        const Difficulty_modes = {
            EASY: "easy",
            INTERMEDIATE: "intermediate",
            HARD: "hard"
        };

        class DifficultyInfo {
            constructor () {
                this.difficulty = Difficulty_modes.INTERMEDIATE;
                this.min_mole_time = 4_000;
                this.max_mole_time = 6_000;
                this.max_mole_ammount = 4;
                this.lock_difficulty = false;
            }

            change_difficulty(mode) {
                if (this.lock_difficulty === false) {
                    switch (mode) {
                        case Difficulty_modes.EASY:
                            this.modify_difficulty(Difficulty_modes.EASY, 5_000, 8_000, 2);
                            break;
                        case Difficulty_modes.INTERMEDIATE:
                            this.modify_difficulty(Difficulty_modes.INTERMEDIATE, 4_000, 6_000, 4);
                            break;
                        case Difficulty_modes.HARD:
                            this.modify_difficulty(Difficulty_modes.HARD, 2_000, 3_000, 6);
                            break;
                    }
                }
                console.log(`Difficulty Info: ${this.difficulty} ${this.min_mole_time} ${this.max_mole_time} ${this.max_mole_ammount}`);
            }
            
            modify_difficulty(selected_difficulty, min_time, max_time, max_ammount) {
                this.difficulty = selected_difficulty;
                this.min_mole_time = min_time;
                this.max_mole_time = max_time;
                this.max_mole_ammount = max_ammount;
            }

            lock_difficulty_function () {
                this.lock_difficulty = true;
            }
        }


        class Timer {
            calculate_time_remaining (time_remaining) {
                let minutes, seconds;

                // Floors both, so neither has decimal places, and so minutes doesn't count the seconds
                minutes = Math.floor(time_remaining / 60_000);
                seconds = Math.floor( (time_remaining % 60_000) / 1_000);

                // Return an object which contains the minutes and seconds;
                return {minutes, seconds};
            }

            update_timer_function () {
                let time_remaining = 45_000;
                const timer_dislay = document.getElementById("round_timer_display");
                const display_update_interval = 1_000;

                clearInterval(this.timer_interval);
                
                let timer_interval = setInterval(() => {
                    let time_remaining_object = this.calculate_time_remaining(time_remaining);
                    let minutes = time_remaining_object.minutes.toString().padStart(2, '0');    // Forces there to be at least two zeros for the time
                    let seconds = time_remaining_object.seconds.toString().padStart(2, '0');

                    // Update the display
                    timer_dislay.innerText = minutes + ":" + seconds;

                    // Update the time remaining
                    time_remaining -= display_update_interval;

                    // Check to see if the timer has reached zero
                    if (minutes === "00" && seconds === "00") {
                        clearInterval(timer_interval);
                        timer.innerText = minutes + ":" + seconds;
                    }

                }, display_update_interval);
            }

        }

        function erase_previous_rounds() {
            
        }

        function start_game(game_settings) {
            // Make sure previous rounds data is wiped
            erase_previous_rounds();


            timer_object = new Timer();

            game_settings.lock_difficulty_function();

            // Makes the timer start ticking
            timer_object.update_timer_function();

        }

        function main () {
            game_settings = new DifficultyInfo();
        
            console.log(`Difficulty Info From Main: ${game_settings.difficulty} ${game_settings.min_mole_time} ${game_settings.max_mole_time} ${game_settings.max_mole_ammount}\n`);
            
        }
        main();

    </script>
