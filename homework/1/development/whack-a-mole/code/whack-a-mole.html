    <script>
        // Constants
        const Difficulty_modes = {
            EASY: "easy",
            INTERMEDIATE: "intermediate",
            HARD: "hard"
        };

        class DifficultyInfo {
            constructor () {
                this.difficulty = Difficulty_modes.INTERMEDIATE;
                this.min_mole_time = 4_000;
                this.max_mole_time = 6_000;
                this.max_mole_amount = 4;
                this.lock_difficulty = false;
            }

            change_difficulty(mode) {
                if (this.lock_difficulty === false) {
                    switch (mode) {
                        case Difficulty_modes.EASY:
                            this.modify_difficulty(Difficulty_modes.EASY, 5_000, 8_000, 2);
                            break;
                        case Difficulty_modes.INTERMEDIATE:
                            this.modify_difficulty(Difficulty_modes.INTERMEDIATE, 4_000, 6_000, 4);
                            break;
                        case Difficulty_modes.HARD:
                            this.modify_difficulty(Difficulty_modes.HARD, 2_000, 3_000, 6);
                            break;
                    }
                }
                console.log(`Difficulty Info: ${this.difficulty} ${this.min_mole_time} ${this.max_mole_time} ${this.max_mole_amount}`);
            }
            
            modify_difficulty(selected_difficulty, min_time, max_time, max_ammount) {
                this.difficulty = selected_difficulty;
                this.min_mole_time = min_time;
                this.max_mole_time = max_time;
                this.max_mole_amount = max_ammount;
            }

            lock_difficulty_function () {
                this.lock_difficulty = true;
            }
        }


        class Timer {
            constructor () {
                this.starting_time = 45_000;
            }
            calculate_time_remaining (time_remaining) {
                let minutes, seconds;

                // Floors both, so neither has decimal places, and so minutes doesn't count the seconds
                minutes = Math.floor(time_remaining / 60_000);
                seconds = Math.floor( (time_remaining % 60_000) / 1_000);

                // Return an object which contains the minutes and seconds;
                return {minutes, seconds};
            }

            update_timer_function () {
                let time_remaining = this.starting_time;
                const timer_dislay = document.getElementById("round_timer_display");
                const display_update_interval = 1_000;

                clearInterval(this.timer_interval);
                
                let timer_interval = setInterval(() => {
                    let time_remaining_object = this.calculate_time_remaining(time_remaining);
                    let minutes = time_remaining_object.minutes.toString().padStart(2, '0');    // Forces there to be at least two zeros for the time
                    let seconds = time_remaining_object.seconds.toString().padStart(2, '0');

                    // Update the display
                    timer_dislay.innerText = minutes + ":" + seconds;

                    // Update the time remaining
                    time_remaining -= display_update_interval;

                    // Check to see if the timer has reached zero
                    if (minutes === "00" && seconds === "00") {
                        clearInterval(timer_interval);
                        timer.innerText = minutes + ":" + seconds;
                    }

                }, display_update_interval);
            }

        }

        
        
        
        
        function erase_previous_rounds() {
            
        }
        
        function start_game(game_settings) {
            // Make sure previous rounds data is wiped
            erase_previous_rounds();
            
            
            timer_object = new Timer();
            
            game_settings.lock_difficulty_function();
            
            // Makes the timer start ticking
            timer_object.update_timer_function();
            
        }

        function hole_picker (hole_grid, game_settings, num_active) {
            let empty_holes = [];
            let index_picked = -1;

            // Check if the maximum active moles has been reached
            if (num_active.value >= game_settings.max_mole_amount) {
                return null;
            }

            // Keep track of which holes are empty
            for (let i = 0; i <= hole_grid.length - 1; ++i) {
                if (hole_grid[i].occupied === false) {
                    empty_holes.push(i);
                }
            }
            
            // Randomly pick a index, which has an empty hole, given the empty hole list
            index_picked = empty_holes[random_number_generator(0, empty_holes.length - 1)];

            // Randomly chose the moles surface time, given the difficulty rules
            hole_grid[index_picked].timeout = random_number_generator(game_settings.min_mole_time, game_settings.max_mole_time);

            // Change the occupancy status of the chosen hole (in hole_grid)
            hole_grid[index_picked].occupied = true;

            // Update the amount of moles that are currently active
            num_active.value++;

            // Return both the index that was picked, and the number of active moles
            return index_picked;
        }

        function mole_pop_up (hole_grid, index, num_active, game_settings) {
            return new Promise ( resolve => {
                const mole_button = document.getElementById("hole_" + index);

                // Check if there is currently the max number of moles
                if (num_active.value > game_settings.max_mole_amount) {
                    return null;
                }

                // Make the mole appear
                mole_button.style.backgroundColor = "black";

                const mole_lifetime = setTimeout( () => {
                    // Make the mole disappear
                    mole_button.style.backgroundColor = "brown";
                    
                    // Update the hole occupancy
                    hole_grid[index].occupied = false;

                    // Update the number of active moles
                    num_active.value--;

                }, hole_grid[index].timeout);
            });
        }

        function random_number_generator (min, max) {
            return Math.floor(Math.random() * (max - min + 1) + min);
        }

        async function main () {
            game_settings = new DifficultyInfo();
            // let num_active = 0;
            let num_active = {value: 0};
            let index_picked = -1;
            timer_obj = new Timer();
            let repeated_operations_count = 0;
            let hole_grid = Array(9).fill().map( () => ({occupied: false, timeout: -1}));
            let hole_picker_obj = {index: -1, active: -1};
            
        
            console.log(`Difficulty Info From Main: ${game_settings.difficulty} ${game_settings.min_mole_time} ${game_settings.max_mole_time} ${game_settings.max_mole_amount}\n`);
            
            // Find some way that it repeates the mole selection for which ones need to pop up

            const time_interval = setInterval( () => {
                // Choose a mole that isn't currently up
                if (num_active.value < game_settings.max_mole_amount) {
                    index_picked = hole_picker(hole_grid, game_settings, num_active);
                    
                    console.log(`(PK) Active_mole_num: ${num_active.value}`);
                    
                    if (index_picked !== null && index_picked !== -1) {
                        // Allow a mole to pop out
                        mole_pop_up(hole_grid, index_picked, num_active, game_settings);
                        console.log(`(UP) Active_mole_num: ${num_active.value}`);
                    }
                    
                    console.log("First go around in the main while loop");
                }
            }, 1_000);
        }
        main();

    </script>
