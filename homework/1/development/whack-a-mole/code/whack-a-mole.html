    <script>
        const start_timer = 5_000;
        let time_remaining = start_timer;

        
        function calculate_time_remaining (time_remaining) {
            let minutes, seconds;

            // Floors both, so neither has decimal places, and so minutes doesn't count the seconds  
            minutes = Math.floor(time_remaining / 60_000);               // 60_000 = (secs in a minute) * (seconds in a microsecond) = 60 * 1000
            seconds = Math.floor( (time_remaining % 60_000) / 1000);     // Calculates the number of seconds
            
            return {minutes, seconds}                                    // Returns an wrapper object, which holds the minutes and seconds remaining on the timer
        }   

        function update_timer_function() {
            const timer_display = document.getElementById("round_timer_display");
            const display_update_interval = 1_000;              // Update every second

            let timer_interval = setInterval(function () {
                let time_remaining_min_sec = calculate_time_remaining(time_remaining);
                let minutes = time_remaining_min_sec.minutes.toString().padStart(2, '0');       // Forces the minute to have a ones and a tens place number
                let seconds = time_remaining_min_sec.seconds.toString().padStart(2, '0');       // Forces the seconds to have a ones and a tens place number

                // Update the display
                timer_display.innerText = minutes + ":" + seconds;                

                // Update the time remaing
                time_remaining -= display_update_interval;

                // Check to see if the timer has reached zero
                if (minutes === "00" && seconds == "00") {
                    clearInterval(timer_interval);
                    timer.innerText = minutes + ":" + seconds;
                }
                
            }, display_update_interval) 

        }

    </script>
