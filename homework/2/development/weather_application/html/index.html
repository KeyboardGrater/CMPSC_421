<!DOCTYPE HTML>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>weather_application</title>

        <!--External Files-->
        <link rel="stylesheet" href="../css/weather_application.css">
        <script src="../javascript/weather_app.js" defer></script>
        <script src="../javascript/api_call.js" defer></script>
        <script src="../javascript/display_weather.js" defer></script>
    </head>

    <body>
        <!--Zip Code Section-->
        <div id="zip-code-section" class="center stack-flexible">
            <!--Zip code prompt-->
            <div>
                <h1>Please enter your zip code</h1>
            </div>
            <!--Zip code input text box-->
            <div>
                <input id="zip-code-text-box"type="text">
            </div>
            <!--Zip code search button-->
            <div>
                <button id="zip-code-submission-button">Search</button>
            </div>
        </div>
    </body>

</html>
